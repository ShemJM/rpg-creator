name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        uses: actions/cache@v4
        with:
          path: bin/godot
          key: godot-${{ runner.os }}-4.6

      - name: Install Godot
        run: make setup

      - name: Run scenario tests
        run: make test
